<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكّل — الفعاليات</title>
<link rel="stylesheet" href="_shared.css">
<style>
.events-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.event-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:20px;transition:box-shadow .2s}
.event-card:hover{box-shadow:var(--shadow)}
.event-type-icon{width:44px;height:44px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.seats-bar{height:4px;background:var(--warm2);border-radius:2px;margin-top:6px;overflow:hidden}
.seats-fill{height:100%;border-radius:2px;background:var(--teal);transition:width .4s}
@media(max-width:700px){.events-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toast" id="toast"><span id="toast-msg"></span></div>
<div class="app-layout">
<aside class="sidebar">
  <div class="sidebar-logo"><a href="index.html" class="logo-mark"><span data-logo="32"></span><span class="logo-name light" style="font-size:15px">شكّل</span></a></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> لوحة التحكم</a>
    <a href="courses.html" class="nav-item"><span class="nav-icon">📚</span> الدورات</a>
    <a href="portal.html" class="nav-item"><span class="nav-icon">🎯</span> مشاريعي</a>
    <a href="community.html" class="nav-item"><span class="nav-icon">💬</span> المجتمع</a>
    <a href="mentors.html" class="nav-item"><span class="nav-icon">🧑‍🏫</span> المرشدون</a>
    <a href="events.html" class="nav-item active"><span class="nav-icon">📅</span> الفعاليات</a>
  </nav>
</aside>
<main class="main-content">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <div><h2>الفعاليات</h2><p style="margin-top:4px">وبينارات، ورش عمل، لقاءات، وهاكاثونات</p></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px" id="type-filters">
    <button class="filter-btn active" onclick="filterEvents('')">الكل</button>
    <button class="filter-btn" onclick="filterEvents('webinar')">🎙️ وبينار</button>
    <button class="filter-btn" onclick="filterEvents('workshop')">🛠️ ورشة</button>
    <button class="filter-btn" onclick="filterEvents('meetup')">🤝 لقاء</button>
    <button class="filter-btn" onclick="filterEvents('competition')">🏆 مسابقة</button>
  </div>
  <div class="events-grid" id="events-list"></div>
</main>
</div>
<script src="_shared.js"></script>
<script>
var TYPE_ICONS={webinar:'🎙️',workshop:'🛠️',meetup:'🤝',competition:'🏆'};
var TYPE_BG={webinar:'#E3F2FD',workshop:'#E8F5E9',meetup:'#FFF8E1',competition:'#F3E5F5'};
var TYPE_LABELS={webinar:'وبينار',workshop:'ورشة عمل',meetup:'لقاء',competition:'مسابقة'};
var activeType='';
function filterEvents(t){
  activeType=t;
  document.querySelectorAll('#type-filters .filter-btn').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  renderEvents();
}
function renderEvents(){
  var list=document.getElementById('events-list');
  var filtered=activeType?EVENTS.filter(function(e){return e.type===activeType;}):EVENTS;
  list.innerHTML='';
  filtered.forEach(function(e){
    var pct=Math.round(e.reg/e.seats*100);
    var remaining=e.seats-e.reg;
    var card=document.createElement('div');
    card.className='event-card';
    card.innerHTML=
      '<div style="display:flex;gap:12px;margin-bottom:14px">'+
        '<div class="event-type-icon" style="background:'+( TYPE_BG[e.type]||'#f5f5f0')+'">'+TYPE_ICONS[e.type]+'</div>'+
        '<div style="flex:1">'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">'+
            '<span class="badge badge-gray">'+TYPE_LABELS[e.type]+'</span>'+
            '<span class="badge '+(e.free?'badge-free':'badge-paid')+'">'+(e.free?'مجاني':''+toAr(e.price)+' ر.س')+'</span>'+
          '</div>'+
          '<div style="font-size:14px;font-weight:700">'+e.title+'</div>'+
        '</div>'+
      '</div>'+
      '<p style="font-size:12px;color:var(--text2);margin-bottom:12px">'+e.desc+'</p>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;color:var(--text3);margin-bottom:12px">'+
        '<div>📅 '+new Date(e.date).toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'})+'</div>'+
        '<div>⏰ '+e.time+'</div>'+
        '<div>⏱ '+e.dur+'</div>'+
        '<div>🧑‍💻 '+e.platform+'</div>'+
        '<div>👤 '+e.host+'</div>'+
        '<div>🪑 '+toAr(remaining)+' مقعد متبقي</div>'+
      '</div>'+
      '<div style="margin-bottom:10px">'+
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px">'+
          '<span>'+toAr(e.reg)+' مسجّل</span><span>'+toAr(pct)+'%</span>'+
        '</div>'+
        '<div class="seats-bar"><div class="seats-fill" style="width:'+pct+'%"></div></div>'+
      '</div>'+
      '<a href="'+e.link+'" target="_blank" class="btn btn-primary btn-full btn-sm">'+
        (e.free?'سجّل مجاناً ←':'سجّل الآن — '+toAr(e.price)+' ر.س ←')+
      '</a>';
    list.appendChild(card);
  });
  if(!filtered.length) list.innerHTML='<div style="text-align:center;padding:48px;color:var(--text3)">لا توجد فعاليات في هذا التصنيف</div>';
}
document.addEventListener('DOMContentLoaded',renderEvents);
</script>
</body>
</html>
