<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكّل مستقبلك — MenaLab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;900&family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#212121;--accent:#EBC84C;--accent2:#D4A017;--teal:#2E7D32;--blue:#1565C0;--purple:#6A1B9A;--red:#dc2626;--surface:#fff;--surface2:#EDEAE6;--surface3:#E5E0D8;--border:rgba(33,33,33,0.12);--border2:rgba(33,33,33,0.22);--text:#212121;--text2:#4a4840;--text3:#8a8678;--r:10px;--r2:16px;--shadow:0 2px 12px rgba(0,0,0,0.07);--shadow2:0 8px 32px rgba(0,0,0,0.12)}
body{font-family:'Noto Kufi Arabic','Cairo',sans-serif;background:var(--surface2);color:var(--text);direction:rtl;min-height:100vh}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--teal),#0c6e56);padding:20px}
.login-box{background:white;border-radius:22px;padding:40px;width:100%;max-width:380px;text-align:center}
.login-logo{width:52px;height:52px;background:var(--teal);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:white;margin:0 auto 18px}
.login-title{font-size:20px;font-weight:800;margin-bottom:5px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.inp{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border .15s;direction:rtl;margin-bottom:10px}
.inp:focus{border-color:var(--teal)}
.btn-full{width:100%;padding:12px;border-radius:10px;border:none;font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;background:var(--accent);color:#212121;transition:background .15s}
.btn-full:hover{background:#158a69}
.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:13px;padding:8px;border-radius:8px;margin-bottom:12px;display:none}
.err.show{display:block}
.portal{display:none}
.portal.visible{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--ink);display:flex;flex-direction:column}
.s-logo{padding:18px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.s-logo-mark{width:34px;height:34px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white}
.s-logo-text{color:white;font-size:15px;font-weight:700}
.s-logo-sub{color:rgba(255,255,255,0.4);font-size:9px;letter-spacing:1px}
.mentor-card{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.m-avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0}
.m-name{color:rgba(255,255,255,0.9);font-size:13px;font-weight:600}
.m-title-small{color:rgba(255,255,255,0.45);font-size:10px}
nav{padding:10px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;position:relative}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
.nav-item.active{background:rgba(26,158,122,0.25);color:white}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.badge{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--accent);color:white;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.s-footer{padding:10px;border-top:1px solid rgba(255,255,255,0.06)}
.s-footer-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,100,100,0.65);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;font-family:'Cairo',sans-serif}
.s-footer-btn:hover{background:rgba(255,0,0,0.1);color:rgba(255,100,100,0.9)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:12px}
.topbar-title{font-size:16px;font-weight:700;flex:1}
.content{flex:1;overflow-y:auto;padding:24px}
.view{display:none}
.view.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:20px 22px;margin-bottom:16px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.stat-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:11px;color:var(--text2)}
.req-card{background:white;border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;margin-bottom:12px;transition:box-shadow .15s}
.req-card:hover{box-shadow:var(--shadow)}
.status-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px}
.s-pending{background:#fef3ec;color:var(--accent)}
.s-answered{background:#dcfce7;color:#166534}
.s-accepted{background:#e8f4ff;color:var(--blue)}
.s-declined{background:#fef2f2;color:#dc2626}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-teal{background:var(--teal);color:white}
.btn-teal:hover{background:#158a69}
.btn-outline{background:white;color:var(--text);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--surface2)}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.reply-area{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none}
.profile-form .fg{margin-bottom:14px}
.profile-form label{font-size:12px;font-weight:600;display:block;margin-bottom:5px}
.profile-form input,.profile-form textarea,.profile-form select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text);outline:none;direction:rtl}
.profile-form textarea{resize:vertical;min-height:80px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:white;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow2)}
.toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<div class="toast" id="toast"><span id="toast-msg"></span></div>

<!-- LOGIN -->

<rect width="80" height="80" rx="16" fill="#212121"/>

</div>

<!-- PORTAL -->
<div class="portal" id="portal">
  <div class="sidebar">
    <div class="s-logo">
      <div style="width:32px;height:32px;flex-shrink:0"><svg width="32" height="32" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

<path d="M60 26 C67 26 72 30 74 35 C76 40 75 45 73 49 C71.5 52 72 55 74 57 C75.5 59 74.5 62 72 63 L60 63" stroke="#EBC84C" stroke-width="2" fill="none" stroke-linecap="round"/>
<line x1="60" y1="28" x2="60" y2="63" stroke="#EBC84C" stroke-width="0.8" stroke-dasharray="2.5 2" opacity=".3"/>

<line x1="52" y1="74" x2="68" y2="74" stroke="#EBC84C" stroke-width="1.5" stroke-linecap="round" opacity=".65"/>

<g transform="translate(22 64)"><path d="M10 2 L11.5 0 L13 2 L12.5 4.5 C14.5 5.2 16 6.5 17 8.2 L19.5 7.8 L20.5 9.5 L18.5 11 C18.8 13 18.2 15 17 16.8 L18.5 18.5 L17 20 L15 18.5 C13.2 19.5 11 20 9 20 C7 20 5 19.5 3 18.5 L1 20 L-0.5 18.5 L1 16.8 C-0.2 15 -0.8 13 -0.5 11 L-2.5 9.5 L-1.5 7.8 L1 8.2 C2 6.5 3.5 5.2 5.5 4.5 L5 2 L6.5 0 L8 2 Z" stroke="#EBC84C" stroke-width="1.2" fill="none" stroke-linejoin="round" opacity=".8"/><circle cx="9" cy="10" r="4" stroke="#EBC84C" stroke-width="1.2" fill="none" opacity=".8"/><circle cx="9" cy="10" r="1.8" fill="#EBC84C" opacity=".8"/></g>

<circle cx="60" cy="18" r="1.8" fill="#EBC84C" opacity=".3"/>
</svg></div>
      <div><div class="s-logo-text" style="font-size:14px">شكّل</div><div class="s-logo-sub">MENTORS</div></div>
    </div>
    <div class="mentor-card">
      <div class="m-avatar" id="m-avatar-sidebar">م</div>
      <div><div class="m-name" id="m-name-sidebar">المرشد</div><div class="m-title-small" id="m-title-sidebar">مرشد</div></div>
    </div>
    <nav>
      <div class="nav-item active" id="nav-overview" onclick="showSection('overview')"><span class="nav-icon">🏠</span> نظرة عامة</div>
      <div class="nav-item" id="nav-questions" onclick="showSection('questions')"><span class="nav-icon">❓</span> الأسئلة <span class="badge" id="q-badge" style="display:none">0</span></div>
      <div class="nav-item" id="nav-sessions" onclick="showSection('sessions')"><span class="nav-icon">📅</span> طلبات الجلسات <span class="badge" id="s-badge" style="display:none">0</span></div>
      <div class="nav-item" id="nav-profile" onclick="showSection('profile')"><span class="nav-icon">👤</span> ملفي الشخصي</div>
    </nav>
    <div class="s-footer"><button class="s-footer-btn" onclick="doLogout()">🚪 تسجيل الخروج</button></div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="section-title">نظرة عامة</div>
      <div style="font-size:12px;color:var(--text2)" id="last-updated"></div>
    </div>
    <div class="content">

      <!-- OVERVIEW -->
      <div class="view active" id="view-overview">
        <div class="stats-row" id="overview-stats"></div>
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:14px">⏳ الطلبات المعلّقة</div>
          <div id="pending-list"></div>
        </div>
      </div>

      <!-- QUESTIONS -->
      <div class="view" id="view-questions">
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button onclick="filterReqs('all','q')" class="filter-btn active" data-scope="q" data-val="all" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:white;font-family:Cairo,sans-serif">الكل</button>
          <button onclick="filterReqs('pending','q')" class="filter-btn" data-scope="q" data-val="pending" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text2);font-family:Cairo,sans-serif">معلّق</button>
          <button onclick="filterReqs('answered','q')" class="filter-btn" data-scope="q" data-val="answered" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text2);font-family:Cairo,sans-serif">تمت الإجابة</button>
        </div>
        <div id="questions-list"></div>
      </div>

      <!-- SESSIONS -->
      <div class="view" id="view-sessions">
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <button onclick="filterReqs('all','s')" class="filter-btn-s active" data-scope="s" data-val="all" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:white;font-family:Cairo,sans-serif">الكل</button>
          <button onclick="filterReqs('pending','s')" class="filter-btn-s" data-scope="s" data-val="pending" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text2);font-family:Cairo,sans-serif">معلّق</button>
          <button onclick="filterReqs('accepted','s')" class="filter-btn-s" data-scope="s" data-val="accepted" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text2);font-family:Cairo,sans-serif">مقبول</button>
          <button onclick="filterReqs('declined','s')" class="filter-btn-s" data-scope="s" data-val="declined" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text2);font-family:Cairo,sans-serif">مرفوض</button>
        </div>
        <div id="sessions-list"></div>
      </div>

      <!-- PROFILE -->
      <div class="view" id="view-profile">
        <div class="card profile-form" id="profile-form">
          <div style="font-size:15px;font-weight:700;margin-bottom:18px">👤 ملفي الشخصي</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="fg"><label>الاسم الكامل</label><input id="pf-name" placeholder="اسمك الكامل"></div>
            <div class="fg"><label>اللقب / التخصص</label><input id="pf-title" placeholder="خبير التفكير التصميمي"></div>
          </div>
          <div class="fg"><label>نبذة مختصرة</label><textarea id="pf-bio" placeholder="اكتب عن نفسك وخبرتك..."></textarea></div>
          <div class="fg"><label>التخصصات (افصل بفاصلة)</label><input id="pf-specs" placeholder="التعاطف، HMW، النمذجة"></div>
          <div class="fg">
            <label>حالة الإتاحة</label>
            <select id="pf-available"><option value="true">متاح للطلبات</option><option value="false">غير متاح حالياً</option></select>
          </div>
          <button onclick="saveProfile()" class="btn btn-teal" style="padding:10px 22px">حفظ الملف الشخصي ✓</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const MENTORS_DATA = [
  {id:'m1',name:'د. سارة الأحمد',title:'خبيرة التفكير التصميمي',avatar:'سا',user:'sara',pass:'mentor2025'},
  {id:'m2',name:'م. خالد المنصور',title:'مهندس تصنيع رقمي',avatar:'خا',user:'khaled',pass:'mentor2025'},
  {id:'m3',name:'أ. نورة السالم',title:'مصممة منتجات رقمية',avatar:'نو',user:'noura',pass:'mentor2025'},
  {id:'m4',name:'م. أحمد الزهراني',title:'خبير الإلكترونيات',avatar:'أح',user:'ahmed',pass:'mentor2025'},
];

let currentMentor = null;
let qFilter = 'all', sFilter = 'all';

function doLogin(){
  const u = document.getElementById('m-user').value.trim();
  const p = document.getElementById('m-pass').value;
  const mentor = MENTORS_DATA.find(m=>m.user===u && m.pass===p);
  if(!mentor){ document.getElementById('login-err').classList.add('show'); return; }
  currentMentor = mentor;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('portal').classList.add('visible');
  document.getElementById('m-avatar-sidebar').textContent = mentor.avatar;
  document.getElementById('m-name-sidebar').textContent = mentor.name;
  document.getElementById('m-title-sidebar').textContent = mentor.title;
  renderAll();
  setInterval(renderAll, 30000); // auto-refresh every 30s
}

function doLogout(){
  currentMentor = null;
  document.getElementById('portal').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
}

function getRequests(type){
  const all = JSON.parse(localStorage.getItem('ml_mentor_requests')||'[]');
  return all.filter(r=>r.mentorId===currentMentor.id && r.type===type);
}

function saveRequests(updated){
  const all = JSON.parse(localStorage.getItem('ml_mentor_requests')||'[]');
  const otherMentors = all.filter(r=>r.mentorId!==currentMentor.id);
  const myIds = updated.map(r=>r.id);
  const others = all.filter(r=>r.mentorId===currentMentor.id && !myIds.includes(r.id));
  localStorage.setItem('ml_mentor_requests', JSON.stringify([...otherMentors, ...updated]));
}

const SECTIONS = ['overview','questions','sessions','profile'];
const TITLES = {overview:'نظرة عامة',questions:'الأسئلة الواردة',sessions:'طلبات الجلسات',profile:'ملفي الشخصي'};

function showSection(id){
  SECTIONS.forEach(s=>{
    document.getElementById('view-'+s).classList.toggle('active',s===id);
    document.getElementById('nav-'+s).classList.toggle('active',s===id);
  });
  document.getElementById('section-title').textContent = TITLES[id];
}

function renderAll(){
  renderOverview(); renderQuestions(); renderSessions(); updateBadges();
  document.getElementById('last-updated').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar');
}

function updateBadges(){
  const qs = getRequests('question').filter(r=>r.status==='pending').length;
  const ss = getRequests('session').filter(r=>r.status==='pending').length;
  const qb = document.getElementById('q-badge');
  const sb = document.getElementById('s-badge');
  qb.textContent = qs; qb.style.display = qs>0?'block':'none';
  sb.textContent = ss; sb.style.display = ss>0?'block':'none';
}

function renderOverview(){
  const qs = getRequests('question');
  const ss = getRequests('session');
  const pending = qs.filter(r=>r.status==='pending').length + ss.filter(r=>r.status==='pending').length;
  document.getElementById('overview-stats').innerHTML = `
    <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">❓</div><div class="stat-val" style="color:var(--accent)">${qs.length}</div><div class="stat-lbl">إجمالي الأسئلة</div></div>
    <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">📅</div><div class="stat-val" style="color:var(--blue)">${ss.length}</div><div class="stat-lbl">طلبات الجلسات</div></div>
    <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">⏳</div><div class="stat-val" style="color:var(--accent2)">${pending}</div><div class="stat-lbl">معلّق</div></div>
    <div class="stat-card"><div style="font-size:20px;margin-bottom:6px">✅</div><div class="stat-val" style="color:var(--teal)">${qs.filter(r=>r.status==='answered').length}</div><div class="stat-lbl">أسئلة أُجيب عليها</div></div>`;
  const pendingList = document.getElementById('pending-list');
  const allPending = [...qs.filter(r=>r.status==='pending'), ...ss.filter(r=>r.status==='pending')].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  if(!allPending.length){ pendingList.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3)">لا توجد طلبات معلّقة 🎉</div>'; return; }
  pendingList.innerHTML = allPending.map(r=>reqCardHTML(r)).join('');
}

function filterReqs(val, scope){
  if(scope==='q') qFilter=val;
  else sFilter=val;
  document.querySelectorAll(scope==='q'?'.filter-btn':'.filter-btn-s').forEach(b=>{
    const active = b.dataset.val===val;
    b.style.background = active?'var(--ink)':'white';
    b.style.color = active?'white':'var(--text2)';
    b.style.borderColor = active?'var(--ink)':'var(--border)';
  });
  if(scope==='q') renderQuestions(); else renderSessions();
}

function renderQuestions(){
  const reqs = getRequests('question');
  const filtered = qFilter==='all' ? reqs : reqs.filter(r=>r.status===qFilter);
  const list = document.getElementById('questions-list');
  if(!filtered.length){ list.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3)">لا توجد أسئلة في هذه الفئة</div>'; return; }
  list.innerHTML = filtered.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>reqCardHTML(r)).join('');
}

function renderSessions(){
  const reqs = getRequests('session');
  const filtered = sFilter==='all' ? reqs : reqs.filter(r=>r.status===sFilter);
  const list = document.getElementById('sessions-list');
  if(!filtered.length){ list.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3)">لا توجد طلبات جلسات في هذه الفئة</div>'; return; }
  list.innerHTML = filtered.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>reqCardHTML(r)).join('');
}

function reqCardHTML(r){
  const statusLabels={pending:'معلّق',answered:'تمت الإجابة',accepted:'مقبول',declined:'مرفوض'};
  const statusCls={pending:'s-pending',answered:'s-answered',accepted:'s-accepted',declined:'s-declined'};
  const isQ = r.type==='question';
  return `<div class="req-card">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-size:12px;font-weight:700;background:${isQ?'#fff7f3':'#e8f4ff'};color:${isQ?'var(--accent)':'var(--blue)'};padding:2px 9px;border-radius:10px">${isQ?'❓ سؤال':'📅 جلسة'}</span>
          <span class="status-pill ${statusCls[r.status]||'s-pending'}">${statusLabels[r.status]||r.status}</span>
          <span style="font-size:11px;color:var(--text3)">${r.student} · ${new Date(r.date).toLocaleDateString('ar')}</span>
        </div>
        ${isQ ? `<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">${r.question}</div>` :
          `<div style="font-size:14px;font-weight:600;margin-bottom:4px">${r.topic||'جلسة إرشاد'}</div>
           ${r.time?`<div style="font-size:12px;color:var(--text2)">🕐 الوقت المفضل: ${r.time}</div>`:''}
           ${r.notes?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${r.notes}</div>`:''}` }
        ${r.reply?`<div style="margin-top:8px;padding:9px 12px;background:#f0fdf7;border-radius:8px;font-size:12px;color:var(--text2)"><strong style="color:var(--teal)">ردّك:</strong> ${r.reply}</div>`:''}
        ${r.status==='pending'?`
          <div class="reply-area" id="ra-${r.id}">
            ${isQ?`<textarea id="reply-${r.id}" placeholder="اكتب ردك على السؤال..." style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:Cairo,sans-serif;font-size:13px;direction:rtl;outline:none;resize:vertical;min-height:80px;margin-bottom:8px"></textarea>
            <button onclick="answerQuestion('${r.id}')" class="btn btn-teal">إرسال الإجابة ✓</button>`:`
            <div style="display:flex;gap:8px">
              <button onclick="updateSession('${r.id}','accepted')" class="btn btn-teal">✓ قبول الجلسة</button>
              <button onclick="updateSession('${r.id}','declined')" class="btn btn-danger">✕ رفض</button>
            </div>`}
          </div>
          <div style="margin-top:8px">
            <button onclick="toggleRA('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--teal);font-family:Cairo,sans-serif">${isQ?'✏️ الرد على السؤال':'📋 إجراء'}</button>
          </div>`:''}
      </div>
    </div>
  </div>`;
}

function toggleRA(id){ const el=document.getElementById('ra-'+id); if(el) el.style.display=el.style.display==='block'?'none':'block'; }

function answerQuestion(id){
  const reply = document.getElementById('reply-'+id)?.value.trim();
  if(!reply){ toast('يرجى كتابة الإجابة'); return; }
  const all = JSON.parse(localStorage.getItem('ml_mentor_requests')||'[]');
  const idx = all.findIndex(r=>r.id===id);
  if(idx>=0){ all[idx].status='answered'; all[idx].reply=reply; localStorage.setItem('ml_mentor_requests',JSON.stringify(all)); }
  renderAll(); toast('تم إرسال إجابتك ✓');
}

function updateSession(id, status){
  const all = JSON.parse(localStorage.getItem('ml_mentor_requests')||'[]');
  const idx = all.findIndex(r=>r.id===id);
  if(idx>=0){ all[idx].status=status; localStorage.setItem('ml_mentor_requests',JSON.stringify(all)); }
  renderAll(); toast(status==='accepted'?'تم قبول الجلسة ✓':'تم رفض الجلسة');
}

function saveProfile(){
  const mentors = JSON.parse(localStorage.getItem('ml_mentors')||'null') || [];
  const idx = mentors.findIndex(m=>m.id===currentMentor.id);
  const updated = {
    ...( idx>=0 ? mentors[idx] : {id:currentMentor.id,avatar:currentMentor.avatar,color:'var(--teal)'}),
    name: document.getElementById('pf-name').value || currentMentor.name,
    title: document.getElementById('pf-title').value || currentMentor.title,
    bio: document.getElementById('pf-bio').value,
    specialties: document.getElementById('pf-specs').value.split(',').map(s=>s.trim()).filter(Boolean),
    available: document.getElementById('pf-available').value==='true'
  };
  if(idx>=0) mentors[idx]=updated; else mentors.push(updated);
  localStorage.setItem('ml_mentors', JSON.stringify(mentors));
  toast('تم حفظ ملفك الشخصي ✓');
}

let toastT;
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toast-msg').textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3000); }
</script>
</body>
</html>
