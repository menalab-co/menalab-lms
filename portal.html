<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>شكّل — بوابة المشروع</title>
<link rel="stylesheet" href="_shared.css">
<style>
.stage-header{background:var(--ink);color:#fff;padding:20px 24px;border-radius:var(--r2);margin-bottom:20px}
.stage-progress-row{display:flex;align-items:center;gap:8px;margin:16px 0}
.stage-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.stage-pill.done{background:rgba(235,200,76,.2);color:var(--gold)}
.stage-pill.active{background:var(--gold);color:var(--ink)}
.stage-pill.locked{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);cursor:not-allowed}
.lesson-content{font-size:14px;line-height:1.8;color:var(--text2)}
.lesson-content h3{font-size:17px;font-weight:700;color:var(--text);margin:20px 0 8px}
.lesson-content h4{font-size:15px;font-weight:600;color:var(--text);margin:16px 0 6px}
.lesson-content ul,.lesson-content ol{padding-right:20px;margin:8px 0}
.lesson-content li{margin-bottom:6px}
.lesson-content strong{color:var(--text);font-weight:600}
.template-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.template-card:hover{border-color:var(--gold);box-shadow:var(--shadow)}
.template-card.submitted{background:var(--teal-light);border-color:var(--teal)}
.template-icon{font-size:28px;flex-shrink:0}
.quiz-container{max-width:640px}
.quiz-option{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500}
.quiz-option:hover{border-color:var(--gold-dark);background:rgba(235,200,76,.05)}
.quiz-option.selected{border-color:var(--gold-dark);background:rgba(235,200,76,.1)}
.quiz-option.correct{border-color:var(--teal);background:var(--teal-light);color:var(--teal)}
.quiz-option.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.quiz-dot{width:8px;height:8px;border-radius:50%;background:var(--warm2);flex-shrink:0}
.quiz-dot.answered{background:var(--gold)}
.quiz-dot.correct{background:var(--teal)}
.quiz-dot.wrong{background:var(--red)}
.checklist-row{display:flex;flex-direction:column;gap:8px;padding:16px;background:var(--warm3);border-radius:var(--r2);margin-bottom:16px}
.template-modal-body{display:flex;flex-direction:column;gap:14px}
.locked-stage{text-align:center;padding:48px 24px}
</style>
</head>
<body>

  iterate: `<h3>مرحلة التكرار</h3><p>التكرار هو <strong>قلب التفكير التصميمي</strong>. بناءً على نتائج الاختبار، تُحسّن نموذجك وتُعيد الاختبار.</p><div class="callout gold">🔄 التكرار ليس فشلاً — هو دليل على التعلم والنضج.</div><h3>دورة التكرار</h3><ol><li>راجع نتائج الاختبار</li><li>حدّد أهم مشكلة للمعالجة</li><li>عدّل النموذج بشكل محدد ومدروس</li><li>أعد الاختبار مع مستخدمين</li><li>كرّر حتى تصل لحل يُلبّي الاحتياجات</li></ol><h3>التأمل النهائي</h3><p>بعد إكمال الدورة كاملة، تأمّل رحلتك: ما الذي تعلمته؟ كيف تغيّر تفكيرك؟ ما الذي ستفعله بشكل مختلف في مشروعك القادم؟</p>`
};

// ── Portal state ─────────────────────────────────────────
var currentProject = null;
var currentStage = 'empathy';
var quizState = { questions:[], current:0, answers:[], score:0, submitted:false };

function getProjectFromURL() {
  var params = new URLSearchParams(window.location.search);
  var pid = params.get('project');
  var state = getUserState();
  if (pid) {
    var proj = (state.projects||[]).find(function(p){return p.id===pid;});
    if (proj) return proj;
  }
  return (state.projects||[])[0] || null;
}

function isStageUnlocked(stageId, project) {
  if (stageId === 'empathy') return true;
  var stages = DT_STAGES.map(function(s){return s.id;});
  var idx = stages.indexOf(stageId);
  if (idx <= 0) return true;
  var prevId = stages[idx-1];
  var prev = (project.stageData||{})[prevId]||{};
  var templates = STAGE_TEMPLATES[prevId]||[];
  var allSubmitted = templates.length === 0 || templates.every(function(t){
    return (prev.submittedTemplates||[]).includes(t.id);
  });
  return prev.contentViewed && allSubmitted && (prev.quizScore||0) >= 90;
}

function isStageComplete(stageId, project) {
  var sd = (project.stageData||{})[stageId]||{};
  return sd.contentViewed && sd.templatesDone && (sd.quizScore||0) >= 90;
}

function saveProject(project) {
  var state = getUserState();
  state.projects = (state.projects||[]).map(function(p){ return p.id===project.id ? project : p; });
  saveUserState(state);
}

// ── Render ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  currentProject = getProjectFromURL();
  if (!currentProject) {
    window.location.href = 'dashboard.html';
    return;
  }
  currentStage = currentProject.currentStage || 'empathy';
  renderStageNav();
  renderStage(currentStage);
  document.getElementById('proj-title-sidebar').textContent = currentProject.title||'';
});

function renderStageNav() {
  var nav = document.getElementById('stage-nav');
  nav.innerHTML = '';
  DT_STAGES.forEach(function(s) {
    var unlocked = isStageUnlocked(s.id, currentProject);
    var done = isStageComplete(s.id, currentProject);
    var active = s.id === currentStage;
    var btn = document.createElement('button');
    btn.className = 'nav-item' + (active?' active':'');
    btn.style.opacity = unlocked ? '1' : '0.45';
    btn.onclick = function(){ if(unlocked) { currentStage=s.id; renderStage(s.id); } else showToast('🔒 أكمل المرحلة السابقة أولاً'); };
    btn.innerHTML = '<span class="nav-icon">' + (done?'✅':active?s.icon:'🔒') + '</span>' + s.label;
    nav.appendChild(btn);
  });
}

function renderStage(stageId) {
  currentStage = stageId;
  currentProject.currentStage = stageId;
  saveProject(currentProject);
  renderStageNav();
  var main = document.getElementById('portal-main');
  var stage = DT_STAGES.find(function(s){return s.id===stageId;});
  if (!stage) return;
  if (!isStageUnlocked(stageId, currentProject)) {
    main.innerHTML = '<div class="locked-stage"><div style="font-size:48px;margin-bottom:16px">🔒</div><h2>هذه المرحلة مغلقة</h2><p style="margin:12px 0 24px">أكمل المرحلة السابقة بنجاح للوصول إلى هذه المرحلة</p><button class="btn btn-primary btn-lg" onclick="renderStage(\''+getPrevStage(stageId)+'\')">← العودة للمرحلة السابقة</button></div>';
    return;
  }
  var sd = (currentProject.stageData||{})[stageId]||{};
  var templates = STAGE_TEMPLATES[stageId]||[];
  var allTemplatesSubmitted = templates.every(function(t){ return (sd.submittedTemplates||[]).includes(t.id); });
  var quizPassed = (sd.quizScore||0) >= 90;
  main.innerHTML =
    (false ? '' : '') + // placeholder
    '<div style="background:#FFF8E1;border:1.5px solid #EBC84C;border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">' +
      '<span style="font-size:20px">⏳</span>' +
      '<div><div style="font-size:13px;font-weight:700;color:#7a5c00">رحلة التفكير التصميمي — قادمة قريباً</div>' +
      '<div style="font-size:11px;color:#9a7c20;margin-top:2px">هذا المحتوى تجريبي. سيُطلق المحتوى الكامل قريباً.</div></div>' +
    '</div>' +
    '<div class="stage-header">' +
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
        '<span style="font-size:32px">' + stage.icon + '</span>' +
        '<div>' +
          '<div style="font-size:11px;color:rgba(255,255,255,.45);margin-bottom:2px">مرحلة ' + (DT_STAGES.indexOf(stage)+1) + ' من ٦</div>' +
          '<h2 style="color:#fff;margin:0">' + stage.label + '</h2>' +
        '</div>' +
      '</div>' +
      '<div style="background:rgba(255,255,255,.08);border-radius:var(--r);padding:10px 12px;font-size:12px;color:rgba(255,255,255,.7)">' +
        '<strong style="color:rgba(255,255,255,.5)">مشروعك:</strong> ' + (currentProject.title||'').substring(0,80) +
      '</div>' +
    '</div>' +
    '<div class="checklist-row">' +
      '<div class="checklist-item ' + (sd.contentViewed?'done':'pending') + '"><span class="check-icon">' + (sd.contentViewed?'✅':'📖') + '</span> قراءة محتوى المرحلة' + (sd.contentViewed?' — مكتمل':'') + '</div>' +
      '<div class="checklist-item ' + (allTemplatesSubmitted?'done':'pending') + '"><span class="check-icon">' + (allTemplatesSubmitted?'✅':'📋') + '</span> تقديم جميع القوالب (' + ((sd.submittedTemplates||[]).length) + '/' + templates.length + ')' + (allTemplatesSubmitted?' — مكتمل':'') + '</div>' +
      '<div class="checklist-item ' + (quizPassed?'done':'pending') + '"><span class="check-icon">' + (quizPassed?'✅':'📝') + '</span> اجتياز التقييم بـ 90%+' + (sd.quizScore?' — '+toAr(sd.quizScore)+'%':'') + '</div>' +
    '</div>' +
    '<div class="tab-nav">' +
      '<button class="tab-btn active" id="tab-learn" onclick="switchTab(\'tab-learn\',\'panel-learn\',\'tab-btn\')">📖 التعلّم</button>' +
      '<button class="tab-btn" id="tab-templates" onclick="switchTab(\'tab-templates\',\'panel-templates\',\'tab-btn\')">📋 القوالب</button>' +
      '<button class="tab-btn" id="tab-quiz" onclick="switchTab(\'tab-quiz\',\'panel-quiz\',\'tab-btn\')">📝 التقييم</button>' +
    '</div>' +
    '<div class="tab-panel active" id="panel-learn">' +
      (getAdminStageVideo(stageId) ? '<div style="aspect-ratio:16/9;background:#000;border-radius:var(--r2);overflow:hidden;margin-bottom:16px"><iframe src="'+getAdminStageVideo(stageId)+'" style="width:100%;height:100%;border:none" allow="autoplay;fullscreen" allowfullscreen></iframe></div>' : '') +
      '<div class="lesson-content" id="stage-content-'+stageId+'">' + (getAdminStageContent(stageId)||STAGE_CONTENT[stageId]||'') + '</div>' +
      '<div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap">' +
        '<button class="btn btn-primary btn-lg" onclick="markContentViewed()">✅ قرأت المحتوى — متابعة إلى القوالب ←</button>' +
        '<div style="background:var(--ink);border-radius:var(--r2);padding:12px 14px;flex:1;min-width:200px">' +
          '<div style="font-size:11px;color:rgba(255,255,255,.45);margin-bottom:6px">💡 تلميح من مرشد AI</div>' +
          '<div style="font-size:13px;color:rgba(255,255,255,.75)" id="ai-stage-hint">' + (getStageHint(stageId)||'استمر في التعلم!') + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="tab-panel" id="panel-templates">' +
      renderTemplatesList(stageId, sd) +
      '<div style="margin-top:20px">' +
        (allTemplatesSubmitted ?
          '<button class="btn btn-primary btn-lg" onclick="switchTab(\'tab-quiz\',\'panel-quiz\',\'tab-btn\')">✅ جميع القوالب مُقدَّمة — انتقل للتقييم ←</button>' :
          '<div class="callout">أكمل تقديم جميع القوالب للانتقال للتقييم</div>'
        ) +
      '</div>' +
    '</div>' +
    '<div class="tab-panel" id="panel-quiz">' +
      renderQuizPanel(stageId, sd) +
    '</div>';

  initStageCarousels(stageId);
  if (!sd.contentViewed) {
    setTimeout(function(){
      if (currentStage===stageId) markContentViewed(true);
    }, 15000);
  }
}

function renderTemplatesList(stageId, sd) {
  var templates = STAGE_TEMPLATES[stageId]||[];
  var submitted = sd.submittedTemplates||[];
  return templates.map(function(t) {
    var done = submitted.includes(t.id);
    var savedData = null;
    try { savedData = JSON.parse(localStorage.getItem('sh_tpl_'+currentProject.id+'_'+t.id)||'null'); } catch(e){}
    var hasDraft = savedData && Object.values(savedData).some(function(v){return v&&v.trim();});
    return '<div class="template-card ' + (done?'submitted':'') + '" onclick="openTemplateModal(\''+stageId+'\',\''+t.id+'\')">' +
      '<div class="template-icon">' + t.icon + '</div>' +
      '<div style="flex:1">' +
        '<div style="font-size:14px;font-weight:600;margin-bottom:2px">' + t.name + '</div>' +
        '<div style="font-size:12px;color:var(--text3)">' + t.desc + '</div>' +
      '</div>' +
      '<div>' +
        (done ?
          '<span class="badge badge-teal">✓ مُقدَّم</span>' :
          hasDraft ?
            '<span class="badge badge-gold">مسودة</span>' :
            '<span class="badge badge-gray">فارغ</span>'
        ) +
      '</div>' +
    '</div>';
  }).join('');
}

function renderQuizPanel(stageId, sd) {
  if ((sd.quizScore||0) >= 90) {
    return '<div style="text-align:center;padding:32px"><div style="font-size:48px;margin-bottom:12px">🎉</div><h3>أحسنت! اجتزت التقييم</h3><div style="font-size:24px;font-weight:700;color:var(--teal);margin:8px 0">'+toAr(sd.quizScore)+'%</div>' + renderUnlockSection(stageId) + '</div>';
  }
  if (sd.quizScore) {
    return '<div class="callout red">حصلت على '+toAr(sd.quizScore)+'% في المحاولة السابقة. تحتاج 90% للاجتياز.</div><button class="btn btn-primary btn-lg" onclick="startQuiz()">🔄 إعادة المحاولة</button><div id="quiz-area"></div>';
  }
  return '<div class="callout">' + (!(sd.contentViewed) ? '📖 اقرأ المحتوى أولاً قبل التقييم.' : !((sd.submittedTemplates||[]).length >= STAGE_TEMPLATES[stageId].length) ? '📋 قدّم جميع القوالب أولاً قبل التقييم.' : '✅ جاهز للتقييم!') + '</div>' +
    (sd.contentViewed && (sd.submittedTemplates||[]).length >= STAGE_TEMPLATES[stageId].length ?
      '<button class="btn btn-primary btn-lg" onclick="startQuiz()">ابدأ التقييم ←</button><div id="quiz-area"></div>' :
      '<div id="quiz-area"></div>'
    );
}

function renderUnlockSection(stageId) {
  var stages = DT_STAGES.map(function(s){return s.id;});
  var idx = stages.indexOf(stageId);
  if (idx < stages.length-1) {
    var nextStage = DT_STAGES[idx+1];
    return '<div style="margin-top:20px"><div class="callout teal">🔓 تم فتح مرحلة: '+nextStage.icon+' '+nextStage.label+'!</div><button class="btn btn-primary btn-lg" onclick="renderStage(\''+nextStage.id+'\')">متابعة إلى '+nextStage.label+' ←</button></div>';
  }
  return '<div class="callout gold">🏆 لقد أكملت جميع مراحل التفكير التصميمي! مبروك!</div><a href="dashboard.html" class="btn btn-primary btn-lg">العودة للوحة التحكم ←</a>';
}

function startQuiz() {
  var questions = STAGE_QUIZZES[currentStage]||[];
  var shuffled = questions.slice().sort(function(){return Math.random()-.5;}).slice(0,10);
  quizState = { questions:shuffled, current:0, answers:new Array(shuffled.length).fill(-1), score:0, submitted:false };
  renderQuestion();
}

function renderQuestion() {
  var area = document.getElementById('quiz-area');
  if (!area) return;
  var q = quizState.questions[quizState.current];
  if (!q) return;
  var dotsHTML = quizState.questions.map(function(_,i) {
    var cls = i===quizState.current?'answered':quizState.answers[i]>=0?'answered':'';
    return '<div class="quiz-dot '+cls+'" style="margin-left:4px"></div>';
  }).join('');
  area.innerHTML =
    '<div class="quiz-container" style="margin-top:20px">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +
        '<span style="font-size:12px;color:var(--text3)">سؤال '+toAr(quizState.current+1)+' من '+toAr(quizState.questions.length)+'</span>' +
        dotsHTML +
      '</div>' +
      '<div style="font-size:15px;font-weight:600;margin-bottom:16px;line-height:1.5">'+q.q+'</div>' +
      q.opts.map(function(opt,i) {
        return '<div class="quiz-option'+(quizState.answers[quizState.current]===i?' selected':'')+'" onclick="selectAnswer('+i+')">'+opt+'</div>';
      }).join('') +
      '<div style="display:flex;gap:10px;margin-top:16px">' +
        (quizState.current>0?'<button class="btn btn-outline" onclick="prevQuestion()">← السابق</button>':'') +
        (quizState.current<quizState.questions.length-1?
          '<button class="btn btn-primary" onclick="nextQuestion()"'+(quizState.answers[quizState.current]<0?' disabled':'')+'>التالي ←</button>':
          '<button class="btn btn-primary" onclick="submitQuiz()"'+(quizState.answers[quizState.current]<0?' disabled':'')+'>تقديم التقييم ✓</button>'
        ) +
      '</div>' +
    '</div>';
}

function selectAnswer(idx) {
  quizState.answers[quizState.current] = idx;
  renderQuestion();
}
function nextQuestion() { if(quizState.current<quizState.questions.length-1){quizState.current++;renderQuestion();} }
function prevQuestion() { if(quizState.current>0){quizState.current--;renderQuestion();} }

function submitQuiz() {
  var correct = quizState.questions.filter(function(q,i){return quizState.answers[i]===q.a;}).length;
  var pct = Math.round(correct/quizState.questions.length*100);
  if (!currentProject.stageData) currentProject.stageData = {};
  if (!currentProject.stageData[currentStage]) currentProject.stageData[currentStage] = {};
  var prevScore = currentProject.stageData[currentStage].quizScore || 0;
  currentProject.stageData[currentStage].quizScore = Math.max(prevScore, pct);
  saveProject(currentProject);
  addXP(pct >= 90 ? 75 : 25);
  var area = document.getElementById('quiz-area');
  if (pct >= 90) {
    showToast('🎉 ممتاز! ' + toAr(pct) + '% — تم فتح المرحلة التالية!');
    var allDone = checkStageBadge(currentStage);
    area.innerHTML = '<div style="text-align:center;padding:24px"><div style="font-size:48px;margin-bottom:12px">🎉</div><h3>ممتاز!</h3><div style="font-size:28px;font-weight:700;color:var(--teal);margin:8px 0">'+toAr(pct)+'%</div>' + renderUnlockSection(currentStage) + '</div>';
  } else {
    area.innerHTML = '<div style="background:var(--red-light);border-radius:var(--r2);padding:16px;margin-top:16px;text-align:center"><div style="font-size:24px;font-weight:700;color:var(--red)">'+toAr(pct)+'%</div><p style="color:var(--red);margin-top:4px">تحتاج 90% للاجتياز. راجع المحتوى وحاول مجدداً.</p><button class="btn btn-primary" style="margin-top:12px" onclick="startQuiz()">🔄 إعادة المحاولة</button></div>';
    showToast('حصلت على ' + toAr(pct) + '% — تحتاج 90% للاجتياز');
  }
  renderStageNav();
}

function checkStageBadge(stageId) {
  var state = getUserState();
  var badgeMap = {empathy:'empathy_done',define:'define_done',ideate:'ideate_done',prototype:'proto_done',test:'test_done',iterate:'full_cycle'};
  var badge = badgeMap[stageId];
  if (badge && !(state.earnedBadges||[]).includes(badge)) {
    state.earnedBadges = state.earnedBadges||[];
    state.earnedBadges.push(badge);
    saveUserState(state);
    showToast('🏅 حصلت على شارة جديدة!');
  }
}

// Init carousels after stage renders
function initStageCarousels(stageId) {
  setTimeout(function() {
    var el = document.getElementById('stage-content-' + stageId);
    if (el && typeof initCarousels === 'function') initCarousels(el);
  }, 80);
}

function markContentViewed(silent) {
  if (!currentProject.stageData) currentProject.stageData = {};
  if (!currentProject.stageData[currentStage]) currentProject.stageData[currentStage] = {};
  currentProject.stageData[currentStage].contentViewed = true;
  saveProject(currentProject);
  addXP(20);
  if (!silent) {
    switchTab('tab-templates','panel-templates','tab-btn');
    showToast('✅ تم تسجيل قراءة المحتوى');
    renderStage(currentStage);
  }
}

function openTemplateModal(stageId, templateId) {
  var templates = STAGE_TEMPLATES[stageId]||[];
  var template = templates.find(function(t){return t.id===templateId;});
  if (!template) return;
  var sd = (currentProject.stageData||{})[stageId]||{};
  var submitted = (sd.submittedTemplates||[]).includes(templateId);
  var editMode = false; // allow re-editing submitted templates
  var savedData = {};
  try { savedData = JSON.parse(localStorage.getItem('sh_tpl_'+currentProject.id+'_'+templateId)||'{}'); } catch(e){}
  var fieldsHTML = template.fields.map(function(f) {
    var val = savedData[f.id]||'';
    return '<div class="form-group">' +
      '<label class="form-label">' + f.label + '</label>' +
      (f.type==='textarea' ?
        '<textarea class="inp textarea" id="tf_'+f.id+'" placeholder="'+f.placeholder+'">'+val+'</textarea>' :
        '<input class="inp" type="text" id="tf_'+f.id+'" placeholder="'+f.placeholder+'" value="'+val+'">') +
    '</div>';
  }).join('');
  document.getElementById('template-modal-content').innerHTML =
    '<div style="font-size:28px;margin-bottom:8px">' + template.icon + '</div>' +
    '<h3 style="margin-bottom:4px">' + template.name + '</h3>' +
    '<p style="font-size:13px;margin-bottom:20px">' + template.desc + '</p>' +
    (submitted ? '<div class="callout teal" style="margin-bottom:8px">✅ هذا القالب مُقدَّم — يمكنك تعديله وإعادة تقديمه</div>' : '') +
    '<div class="template-modal-body">' + fieldsHTML + '</div>' +
    (!submitted ?
      '<div style="display:flex;gap:10px;margin-top:20px">' +
        '<button class="btn btn-outline" onclick="saveTemplateDraft(\''+stageId+'\',\''+templateId+'\')">💾 حفظ مسودة</button>' +
        '<button class="btn btn-primary btn-full" onclick="submitTemplate(\''+stageId+'\',\''+templateId+'\')">تقديم القالب ✓</button>' +
      '</div>' :
      '<button class="btn btn-outline btn-full" style="margin-top:20px" onclick="closeModal(\'template-modal\')">إغلاق</button>'
    );
  openModal('template-modal');
}

function getTemplateData(template) {
  var data = {};
  template.fields.forEach(function(f) {
    var el = document.getElementById('tf_'+f.id);
    if (el) data[f.id] = el.value.trim();
  });
  return data;
}

function saveTemplateDraft(stageId, templateId) {
  var templates = STAGE_TEMPLATES[stageId]||[];
  var template = templates.find(function(t){return t.id===templateId;});
  if (!template) return;
  var data = getTemplateData(template);
  localStorage.setItem('sh_tpl_'+currentProject.id+'_'+templateId, JSON.stringify(data));
  showToast('💾 تم حفظ المسودة');
}

function submitTemplate(stageId, templateId) {
  var templates = STAGE_TEMPLATES[stageId]||[];
  var template = templates.find(function(t){return t.id===templateId;});
  if (!template) return;
  var data = getTemplateData(template);
  var filled = Object.values(data).filter(function(v){return v&&v.trim();}).length;
  if (filled < Math.ceil(template.fields.length/2)) {
    showToast('يرجى ملء معظم حقول القالب قبل التقديم');
    return;
  }
  localStorage.setItem('sh_tpl_'+currentProject.id+'_'+templateId, JSON.stringify(data));
  if (!currentProject.stageData) currentProject.stageData = {};
  if (!currentProject.stageData[stageId]) currentProject.stageData[stageId] = {};
  if (!currentProject.stageData[stageId].submittedTemplates) currentProject.stageData[stageId].submittedTemplates = [];
  if (!currentProject.stageData[stageId].submittedTemplates.includes(templateId)) {
    currentProject.stageData[stageId].submittedTemplates.push(templateId);
  }
  saveProject(currentProject);
  addXP(25);
  closeModal('template-modal');
  showToast('✅ تم تقديم القالب!');
  renderStage(stageId);
}

function getPrevStage(stageId) {
  var stages = DT_STAGES.map(function(s){return s.id;});
  var idx = stages.indexOf(stageId);
  return idx > 0 ? stages[idx-1] : 'empathy';
}
</script>
