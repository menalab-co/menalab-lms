<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكّل — الدورات</title>
<link rel="stylesheet" href="_shared.css">
<style>
.courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.course-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all .2s;cursor:pointer;display:block;text-decoration:none;color:inherit}
.course-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.course-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:52px}
.course-body{padding:16px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s;font-family:inherit}
.filter-btn.active{background:var(--ink);color:var(--gold);border-color:var(--ink)}
@media(max-width:900px){.courses-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.courses-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="greeting-bar" style="display:none"></div>
<div id="purchase-modal" class="modal-overlay"><div class="modal-box"><button class="modal-close" onclick="closeModal('purchase-modal')">✕</button><div id="purchase-modal-body"></div></div></div>
<div class="toast" id="toast"><span id="toast-msg"></span></div>
<div class="app-layout">
<aside class="sidebar">
  <div class="sidebar-logo"><a href="index.html" class="logo-mark"><span data-logo="32"></span><span class="logo-name light" style="font-size:15px">شكّل</span></a></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">الرئيسية</div>
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> لوحة التحكم</a>
    <a href="courses.html" class="nav-item active"><span class="nav-icon">📚</span> الدورات</a>
    <div class="sidebar-section">تعلّم</div>
    <a href="portal.html" class="nav-item"><span class="nav-icon">🎯</span> مشاريعي</a>
    <a href="community.html" class="nav-item"><span class="nav-icon">💬</span> المجتمع</a>
    <a href="mentors.html" class="nav-item"><span class="nav-icon">🧑‍🏫</span> المرشدون</a>
    <a href="events.html" class="nav-item"><span class="nav-icon">📅</span> الفعاليات</a>
  </nav>
</aside>
<main class="main-content">
  <div style="margin-bottom:24px"><h2>الدورات</h2><p style="margin-top:4px">اختر دورة وابدأ رحلة التعلم</p></div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterCourses('')">الكل</button>
    <button class="filter-btn" onclick="filterCourses('design')">🎨 تصميم</button>
    <button class="filter-btn" onclick="filterCourses('fabrication')">🛠️ تصنيع</button>
    <button class="filter-btn" onclick="filterCourses('free')">مجاني</button>
  </div>
  <div class="courses-grid" id="courses-grid"></div>
</main>
</div>
<script src="_shared.js"></script>
<script>
var activeFilter = '';
function filterCourses(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  renderCourses();
}
var BG_COLORS = {dt:'#FFF8E1',cad:'#E3F2FD','3dp':'#E8F5E9',laser:'#FFF3E0',ux:'#F3E5F5',elec:'#FFF9C4',cnc:'#EFEBE9'};
function renderCourses() {
  var grid = document.getElementById('courses-grid');
  var state = getUserState();
  var enrolled = state.enrolledCourses||['dt'];
  var filtered = COURSES.filter(function(c){
    if(activeFilter==='free') return c.free;
    if(activeFilter) return c.category===activeFilter;
    return true;
  });
  grid.innerHTML = '';
  filtered.forEach(function(c) {
    var isEnrolled = enrolled.includes(c.id);
    var card = document.createElement('a');
    card.href = 'course-player.html?course='+c.id;
    card.className = 'course-card';
    card.innerHTML =
      '<div class="course-thumb" style="background:'+( BG_COLORS[c.id]||'#f5f5f0')+'">'+c.icon+'</div>'+
      '<div class="course-body">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'+
          '<span class="badge '+(c.free?'badge-free':'badge-paid')+'">'+(c.free?'مجاني':''+toAr(c.price)+' ر.س')+'</span>'+
          '<span class="badge badge-gray">'+c.level+'</span>'+
          (isEnrolled?'<span class="badge badge-teal">مسجّل</span>':'')+
        '</div>'+
        '<div style="font-size:15px;font-weight:700;margin-bottom:4px">'+c.title+'</div>'+
        '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">'+c.desc+'</div>'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:14px">'+
          '<span>⏱ '+c.duration+'</span><span>📖 '+toAr(c.lessons)+' دروس</span><span>🔋 '+toAr(c.credits)+' AI</span>'+
        '</div>'+
        '<button onclick="event.preventDefault();enrollCourse(\''+c.id+'\')" class="btn btn-full '+(isEnrolled?'btn-teal':'btn-primary')+'" style="font-size:13px">'+
          (isEnrolled?'← متابعة الدورة':'سجّل الآن'+(c.free?' — مجاني':' — '+toAr(c.price)+' ر.س'))+
        '</button>'+
      '</div>';
    grid.appendChild(card);
  });
}
function enrollCourse(cid) {
  var state = getUserState();
  if(!state.enrolledCourses) state.enrolledCourses=[];
  if(!state.enrolledCourses.includes(cid)) {
    var course = COURSES.find(function(c){return c.id===cid;});
    state.enrolledCourses.push(cid);
    state.aiCredits = (state.aiCredits||0) + (course?course.credits:30);
    state.maxCredits = (state.maxCredits||0) + (course?course.credits:30);
    saveUserState(state);
    addXP(50);
    showToast('✅ تم التسجيل في الدورة!');
  }
  window.location.href = 'course-player.html?course='+cid;
}
document.addEventListener('DOMContentLoaded', renderCourses);
</script>
</body>
</html>
