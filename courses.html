<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكّل — الدورات</title>
<link rel="stylesheet" href="_shared.css">
<style>
.courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.course-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all .2s;cursor:pointer;display:block;text-decoration:none;color:inherit}
.course-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.course-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:52px}
.course-body{padding:16px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s;font-family:inherit}
.filter-btn.active{background:var(--ink);color:var(--gold);border-color:var(--ink)}
@media(max-width:900px){.courses-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.courses-grid{grid-template-columns:1fr}}

.coming-soon-card{opacity:.75}
.coming-soon-card .course-thumb{filter:saturate(.4)}
</style>
</head>
<body>
<div id="greeting-bar" style="display:none"></div>
<div id="purchase-modal" class="modal-overlay"><div class="modal-box"><button class="modal-close" onclick="closeModal('purchase-modal')">✕</button><div id="purchase-modal-body"></div></div></div>
<div class="toast" id="toast"><span id="toast-msg"></span></div>
<div class="app-layout">
<aside class="sidebar">
  <div class="sidebar-logo"><a href="index.html" class="logo-mark"><span data-logo="32"></span><span class="logo-name light" style="font-size:15px">شكّل</span></a></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">الرئيسية</div>
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> لوحة التحكم</a>
    <a href="courses.html" class="nav-item active"><span class="nav-icon">📚</span> الدورات</a>
    <div class="sidebar-section">تعلّم</div>
    <a href="portal.html" class="nav-item"><span class="nav-icon">🎯</span> مشاريعي</a>
    <a href="community.html" class="nav-item"><span class="nav-icon">💬</span> المجتمع</a>
    <a href="mentors.html" class="nav-item"><span class="nav-icon">🧑‍🏫</span> المرشدون</a>
    <a href="events.html" class="nav-item"><span class="nav-icon">📅</span> الفعاليات</a>
  </nav>
</aside>
<main class="main-content">
  <div style="margin-bottom:24px"><h2>الدورات</h2><p style="margin-top:4px">اختر دورة وابدأ رحلة التعلم</p></div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterCourses('')">الكل</button>
    <button class="filter-btn" onclick="filterCourses('design')">🎨 تصميم</button>
    <button class="filter-btn" onclick="filterCourses('fabrication')">🛠️ تصنيع</button>
    <button class="filter-btn" onclick="filterCourses('free')">مجاني</button>
  </div>
  <div class="courses-grid" id="courses-grid"></div>
</main>
</div>
<!-- PAYMENT MODAL -->
<div class="modal-overlay" id="payment-modal">
  <div class="modal-box" style="max-width:480px;text-align:center">
    <button class="modal-close" onclick="closeModal('payment-modal')">✕</button>
    <div style="font-size:48px;margin-bottom:12px">💳</div>
    <h2 id="pm-title" style="margin-bottom:6px"></h2>
    <div id="pm-price-display" style="font-size:28px;font-weight:700;color:var(--gold-dark);margin-bottom:8px"></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:28px">اختر طريقة الدفع المناسبة لك</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
      <button onclick="processPayment('card')" class="btn btn-primary btn-lg btn-full" style="justify-content:center">
        💳 بطاقة ائتمان / مدى
      </button>
      <button onclick="processPayment('apple')" class="btn btn-outline btn-lg btn-full" style="justify-content:center;background:#000;color:#fff;border-color:#000">
        🍎 Apple Pay
      </button>
      <button onclick="processPayment('stc')" class="btn btn-outline btn-lg btn-full" style="justify-content:center">
        📱 STC Pay
      </button>
    </div>
    <p style="font-size:11px;color:var(--text3)">🔒 جميع المدفوعات مشفرة وآمنة</p>
  </div>
</div>

<script src="_shared.js"></script>
<script>
var BG_COLORS = {prototyping:'#E8F5E9',dt:'#FFF8E1',cad:'#E3F2FD','3dp':'#E8F5E9',laser:'#FFF3E0',ux:'#F3E5F5',elec:'#FFF9C4',cnc:'#EFEBE9'};
var activeFilter = ''; // '' = all, 'free', 'live', 'design', 'fabrication'

function filterCourses(cat) {
  activeFilter = cat || '';
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  if (event && event.target) event.target.classList.add('active');
  renderCourses();
}

function renderCourses() {
  var grid = document.getElementById('courses-grid');
  var loggedIn = (typeof getUser === 'function') ? !!getUser() : false;

  // Build a fresh display list without mutating global COURSES
  var displayCourses = COURSES.map(function(c) {
    var storedStatus = localStorage.getItem('sh_course_status_' + c.id);
    if (storedStatus) {
      return Object.assign({}, c, {
        live:       storedStatus === 'active',
        comingSoon: storedStatus === 'coming_soon',
        inactive:   storedStatus === 'inactive'
      });
    }
    return c;
  });

  // Add admin-added modules
  try {
    var adminModules = JSON.parse(localStorage.getItem('sh_admin_modules') || '[]');
    adminModules.forEach(function(mod) {
      if (displayCourses.find(function(c){ return c.id === mod.id; })) return;
      var status = localStorage.getItem('sh_course_status_' + mod.id) || 'active';
      displayCourses.push({
        id: mod.id, title: mod.title, icon: mod.icon,
        price: mod.price || 0, free: (mod.price||0) === 0,
        credits: mod.credits || 25, category: mod.category || 'design',
        level: mod.level || 'مبتدئ', duration: mod.duration || '',
        lessons: (JSON.parse(localStorage.getItem('sh_admin_lessons_'+mod.id)||'[]')).length,
        desc: mod.desc || '', badge: mod.icon + ' ' + mod.title,
        live: status === 'active', comingSoon: status === 'coming_soon',
        inactive: status === 'inactive'
      });
    });
  } catch(e) {}
  // Only use enrollment from state if user is actually logged in
  var enrolled = loggedIn ? (getUserState().enrolledCourses || []) : [];
  var filtered = displayCourses.filter(function(c) {
    if (c.inactive) return false; // hidden by admin
    if (activeFilter === 'free') return c.free;
    if (activeFilter === 'live') return !c.comingSoon;
    if (activeFilter) return c.category === activeFilter;
    return true;
  });

  grid.innerHTML = '';
  filtered.forEach(function(c) {
    var isEnrolled = enrolled.includes(c.id);
    var isLive = !c.comingSoon;
    var thumbBg = BG_COLORS[c.id] || '#f5f5f0';
    // Apply admin price override FIRST so badges read correct values
    var storedPrice = localStorage.getItem('sh_course_price_' + c.id);
    if (storedPrice !== null) {
      c = Object.assign({}, c, {
        price: parseInt(storedPrice) || 0,
        free: parseInt(storedPrice) === 0
      });
    }
    // Also check Supabase-synced price (same key, already in localStorage after sync)

    var card = document.createElement('div');
    card.className = 'course-card' + (isLive ? '' : ' coming-soon-card');

    // Thumb
    var thumb = document.createElement('div');
    thumb.className = 'course-thumb';
    thumb.style.background = thumbBg;
    thumb.style.position = 'relative';
    thumb.innerHTML = '<span style="font-size:52px">' + c.icon + '</span>';
    if (!isLive) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:absolute;inset:0;background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;border-radius:var(--r2) var(--r2) 0 0';
      overlay.innerHTML = '<span style="font-size:13px;font-weight:700;color:var(--text2)">⏳ قريباً</span>';
      thumb.appendChild(overlay);
    }

    // Body
    var body = document.createElement('div');
    body.className = 'course-body';

    // Badges
    var badges = '';
    if (isLive) badges += '<span class="badge" style="background:#E8F5E9;color:#2E7D32;font-size:10px">🟢 متاح الآن</span>';
    else badges += '<span class="badge badge-gray" style="font-size:10px">⏳ قريباً</span>';
    if (c.free) {
      badges += '<span class="badge badge-free">مجاني</span>';
    } else {
      badges += '<span class="badge badge-paid" style="background:#FFF3E0;color:#E65100;font-size:10px;font-weight:700">💳 ' + toAr(c.price) + ' ر.س</span>';
    }
    badges += '<span class="badge badge-gray">' + c.level + '</span>';
    if (isEnrolled && isLive && loggedIn) badges += '<span class="badge badge-teal">مسجّل ✓</span>';

    body.innerHTML =
      '<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px">' + badges + '</div>' +
      '<div style="font-size:15px;font-weight:700;margin-bottom:4px;color:' + (isLive ? 'var(--text)' : 'var(--text3)') + '">' + c.title + '</div>' +
      '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">' + c.desc + '</div>' +
      (isLive ? '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:14px"><span>⏱ ' + c.duration + '</span><span>📖 ' + toAr(c.lessons) + ' دروس</span><span>🔋 ' + toAr(c.credits) + ' AI</span></div>' : '');

    // Button
    var btn = document.createElement('button');
    btn.className = 'btn btn-full ' + (isLive ? (isEnrolled ? 'btn-teal' : 'btn-primary') : 'btn-outline');
    btn.style.fontSize = '13px';
    if (!isLive) { btn.disabled = true; btn.style.opacity = '0.6'; btn.style.cursor = 'not-allowed'; }
    var btnLabel = '';
    if (!isLive) {
      btnLabel = '🔔 أبلغني عند الإطلاق';
    } else if (isEnrolled && loggedIn) {
      btnLabel = '← متابعة الدورة';
    } else if (c.free) {
      btnLabel = 'سجّل الآن — مجاني';
    } else {
      btnLabel = 'اشتر الدورة — ' + toAr(c.price) + ' ر.س';
    }
    btn.textContent = btnLabel;
    if (isLive) {
      (function(cid, isFree, coursePrice, alreadyEnrolled){
        btn.onclick = function(){
          if (alreadyEnrolled) {
            window.location.href = 'course-player.html?course=' + cid;
            return;
          }
          if (!loggedIn) {
            window.location.href = 'index.html?next=course-player&course=' + cid;
            return;
          }
          if (isFree) {
            enrollCourse(cid);
          } else {
            openPaymentModal(cid, coursePrice);
          }
        };
      })(c.id, c.free, c.price, isEnrolled);
    }

    body.appendChild(btn);
    card.appendChild(thumb);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

var _pendingPaymentCourse = null;

function openPaymentModal(cid, price) {
  _pendingPaymentCourse = cid;
  var course = COURSES.find(function(c){ return c.id === cid; });
  document.getElementById('pm-title').textContent = course ? course.title : 'الدورة';
  document.getElementById('pm-price-display').textContent = toAr(price) + ' ر.س';
  openModal('payment-modal');
}

function processPayment(method) {
  // Payment gateway integration point
  // Replace this with real Stripe/HyperPay/Moyasar integration
  var cid = _pendingPaymentCourse;
  if (!cid) return;
  closeModal('payment-modal');

  // Simulate payment processing
  showToast('⏳ جاري معالجة الدفع...');
  setTimeout(function() {
    // On success: enroll the user
    enrollCourse(cid);
    showToast('✅ تمت عملية الدفع بنجاح! تم تفعيل الدورة.');
    _pendingPaymentCourse = null;
  }, 1500);
}

function enrollCourse(cid) {
  var state = getUserState();
  if (!state.enrolledCourses) state.enrolledCourses = [];
  if (!state.enrolledCourses.includes(cid)) {
    var course = COURSES.find(function(c){ return c.id === cid; });
    state.enrolledCourses.push(cid);
    state.aiCredits = (state.aiCredits || 0) + (course ? course.credits : 30);
    state.maxCredits = (state.maxCredits || 0) + (course ? course.credits : 30);
    saveUserState(state);
    addXP(50);
    showToast('✅ تم التسجيل في الدورة!');
  }
  window.location.href = 'course-player.html?course=' + cid;
}

document.addEventListener('DOMContentLoaded', function() {
  // Always render immediately from localStorage
  renderCourses();
  // Then sync from Supabase in background
  if(typeof dbSyncAllContent==='function'){
    dbSyncAllContent(function(){
      if(typeof dbLoadCourseStatuses==='function') dbLoadCourseStatuses(function(){ renderCourses(); });
    });
  }
  // Add "live" filter button
  var filterBar = document.querySelector('.filter-bar');
  if (filterBar) {
    var liveBtn = document.createElement('button');
    liveBtn.className = 'filter-btn';
    liveBtn.textContent = '🟢 متاح الآن';
    liveBtn.onclick = function(){ filterCourses('live'); };
    filterBar.insertBefore(liveBtn, filterBar.firstChild.nextSibling);
  }
  renderCourses();
});
</script>
</body>
</html>
